<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" style="background:#0d0d0d;font-family:JetBrains Mono,monospace">
    <text x="400" y="25" text-anchor="middle" fill="#e8e4dc" font-size="14" font-weight="bold">CASCADED FILTER CHAIN — Signal Processing Pipeline</text><rect x="30" y="60" width="100" height="80" fill="#111" stroke="#6b6b6b" stroke-width="2" rx="4"/><text x="80" y="82" text-anchor="middle" fill="#6b6b6b" font-size="9" font-weight="bold">RAW</text><text x="80" y="96" text-anchor="middle" fill="#6b6b6b" font-size="9" font-weight="bold">PREDICTION</text><text x="80" y="112" text-anchor="middle" fill="#9ca3af" font-size="8">48.5%</text><text x="80" y="160" text-anchor="middle" fill="#333" font-size="7" font-style="italic">Broadband</text><text x="80" y="172" text-anchor="middle" fill="#333" font-size="7" font-style="italic">noise</text><line x1="132" y1="100" x2="146" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/><rect x="148" y="60" width="100" height="80" fill="#111" stroke="#f87171" stroke-width="2" rx="4"/><text x="198" y="82" text-anchor="middle" fill="#f87171" font-size="9" font-weight="bold">AGREEMENT</text><text x="198" y="96" text-anchor="middle" fill="#f87171" font-size="9" font-weight="bold">FILTER</text><text x="198" y="112" text-anchor="middle" fill="#9ca3af" font-size="8">disagree→F</text><text x="198" y="124" text-anchor="middle" fill="#9ca3af" font-size="8">57-73%</text><text x="198" y="160" text-anchor="middle" fill="#333" font-size="7" font-style="italic">Bandpass:</text><text x="198" y="172" text-anchor="middle" fill="#333" font-size="7" font-style="italic">remove noise</text><line x1="250" y1="100" x2="264" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/><rect x="266" y="60" width="100" height="80" fill="#111" stroke="#a78bfa" stroke-width="2" rx="4"/><text x="316" y="82" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="bold">MARKET</text><text x="316" y="96" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="bold">FILTER</text><text x="316" y="112" text-anchor="middle" fill="#9ca3af" font-size="8">JSE/US</text><text x="316" y="124" text-anchor="middle" fill="#9ca3af" font-size="8">split</text><text x="316" y="160" text-anchor="middle" fill="#333" font-size="7" font-style="italic">Band</text><text x="316" y="172" text-anchor="middle" fill="#333" font-size="7" font-style="italic">selection</text><line x1="368" y1="100" x2="382" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/><rect x="384" y="60" width="100" height="80" fill="#111" stroke="#fb923c" stroke-width="2" rx="4"/><text x="434" y="82" text-anchor="middle" fill="#fb923c" font-size="9" font-weight="bold">DIRECTION</text><text x="434" y="96" text-anchor="middle" fill="#fb923c" font-size="9" font-weight="bold">FADE</text><text x="434" y="112" text-anchor="middle" fill="#9ca3af" font-size="8">BF/AF</text><text x="434" y="124" text-anchor="middle" fill="#9ca3af" font-size="8">60-65%</text><text x="434" y="160" text-anchor="middle" fill="#333" font-size="7" font-style="italic">Phase</text><text x="434" y="172" text-anchor="middle" fill="#333" font-size="7" font-style="italic">inversion</text><line x1="486" y1="100" x2="500" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/><rect x="502" y="60" width="100" height="80" fill="#111" stroke="#4ade80" stroke-width="2" rx="4"/><text x="552" y="82" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold">KELLY</text><text x="552" y="96" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold">SIZING</text><text x="552" y="112" text-anchor="middle" fill="#9ca3af" font-size="8">S:25%</text><text x="552" y="124" text-anchor="middle" fill="#9ca3af" font-size="8">A:20%</text><text x="552" y="160" text-anchor="middle" fill="#333" font-size="7" font-style="italic">Automatic</text><text x="552" y="172" text-anchor="middle" fill="#333" font-size="7" font-style="italic">gain control</text><line x1="604" y1="100" x2="618" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/><rect x="620" y="60" width="100" height="80" fill="#111" stroke="#22d3ee" stroke-width="2" rx="4"/><text x="670" y="82" text-anchor="middle" fill="#22d3ee" font-size="9" font-weight="bold">RESOLVE</text><text x="670" y="96" text-anchor="middle" fill="#22d3ee" font-size="9" font-weight="bold">(PnL)</text><text x="670" y="112" text-anchor="middle" fill="#9ca3af" font-size="8">profit</text><text x="670" y="124" text-anchor="middle" fill="#9ca3af" font-size="8">or loss</text><text x="670" y="160" text-anchor="middle" fill="#333" font-size="7" font-style="italic">Demodulate</text><text x="670" y="172" text-anchor="middle" fill="#333" font-size="7" font-style="italic">baseband</text><defs><marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/></marker></defs><text x="30" y="270" fill="#6b6b6b" font-size="9">Signal path: each stage filters noise. The system has maximum gain in the anti-signal direction (fade).</text><text x="30" y="285" fill="#6b6b6b" font-size="9">RF analogy: bandpass → band select → phase invert → AGC → demodulate. Standard receiver architecture.</text></svg>